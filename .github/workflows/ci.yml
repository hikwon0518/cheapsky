# Cheapsky CI — PR + main push 에서 app 과 harness 검증.
#
# - app: pnpm test · typecheck · lint · build
# - harness: pytest (훅 + execute 자가 테스트)
#
# Secrets 없음 (Supabase 호출은 mock · 크롤러는 fixture 사용).

name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    name: app (Next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build (dummy env)
        run: pnpm build
        env:
          # 빌드 시점에만 쓰이는 dummy (실 secret 은 Vercel 에)
          NEXT_PUBLIC_SUPABASE_URL: https://ci.example.com
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-service-role
          CRAWLER_USER_AGENT: Cheapsky-CI/0.1

  harness:
    name: harness (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: harness_framework
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run pytest
        env:
          PYTHONIOENCODING: utf-8
        run: python -m pytest scripts/ -q
