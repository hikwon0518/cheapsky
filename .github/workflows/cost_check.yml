# Cheapsky — 비용·스토리지 모니터 (Core, ADR-022/ARCHITECTURE 관측·운영).
#
# cron: 매일 UTC 00:00 = KST 09:00.
#   - deals + price_observations 행 수 집계 → api_usage_daily UPSERT
#   - 임계 초과 시 ALERT_WEBHOOK 으로 알림 POST
#
# Hard red lines:
#   - CHEAPSKY_STAGE 설정 금지 (Core gate).
#   - Anthropic 토큰 필드는 Core 에선 항상 0 (scripts/cost_check.ts 고정).

name: cost_check

on:
  schedule:
    # UTC 00:00 = KST 09:00. ARCHITECTURE (5) 비용 모니터.
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  cost_check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run cost_check
        run: pnpm tsx scripts/cost_check.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          ALERT_WEBHOOK: ${{ secrets.ALERT_WEBHOOK }}
          # CHEAPSKY_STAGE: 설정하지 않음 (Core gate).
