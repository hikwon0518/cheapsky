# Cheapsky — 딜 실효성 검증 (Core, ADR-018 HEAD only).
#
# cron: 매 3 시간. 24h+ 딜을 원문 재방문해 active/snapshot 판정.
# 로컬 재실행:
#   cd app && pnpm tsx scripts/verify.ts
#
# Hard red lines:
#   - CHEAPSKY_STAGE 설정 금지 (Core, 훅 게이트).
#   - GET + 가격 패턴 검출은 Stretch 2 범위. 여기선 HEAD 만.

name: verify

on:
  schedule:
    # 3 시간 주기 (UTC). ADR-018.
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run verify
        run: pnpm tsx scripts/verify.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          CRAWLER_USER_AGENT: ${{ secrets.CRAWLER_USER_AGENT }}
          # CHEAPSKY_STAGE: 설정하지 않음 (Core gate).
