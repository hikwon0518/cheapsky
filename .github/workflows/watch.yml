# Cheapsky — 노선 감시 cron (C1 2026-04-19).
#
# cron: 매 시 :45 (crawl 15분 간격·curate :30 과 겹치지 않게 여유).
# 매칭되면 이메일 발송 (Resend). RESEND_API_KEY 미설정 시 console log only.

name: watch

on:
  schedule:
    - cron: '45 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run watch
        run: pnpm tsx scripts/watch.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          WATCHER_FROM_EMAIL: ${{ secrets.WATCHER_FROM_EMAIL }}
          WATCHER_OWNER_EMAIL: ${{ secrets.WATCHER_OWNER_EMAIL }}
